version: '3.8'

services:
  db:
    image: ankane/pgvector
    container_name: pgvector-db
    environment:
      POSTGRES_DB: emails
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yourpassword
    ports:
      - "5440:5432"

  app:
    build: .
    container_name: rag-app
    depends_on:
      - db
    volumes:
      - .:/app
